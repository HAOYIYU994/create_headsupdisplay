name: build

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'push' || github.event.head_commit == null || !startsWith(github.event.head_commit.message, '[skip]')
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "21"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Give Gradle execution permissions
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew build --stacktrace

      - name: Collect release jars
        run: |
          mkdir -p build/release
          find build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "*-dev.jar" \
            -exec cp {} build/release/ \;
          test -n "$(find build/release -maxdepth 1 -type f -name '*.jar' -print -quit)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: create-radar-jars
          path: build/release/*.jar
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-radar-jars
          path: build/release

      - name: Upload jars to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" build/release/*.jar --clobber
          else
            gh release create "$RELEASE_TAG" build/release/*.jar --title "$RELEASE_TAG" --generate-notes
          fi
