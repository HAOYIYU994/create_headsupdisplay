modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/DXENDBucket/Create-Radar-Sable/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
modUrl = "https://github.com/DXENDBucket/Create-Radar-Sable"
displayURL = "https://github.com/DXENDBucket/Create-Radar-Sable"
issueTrackerURL = "https://github.com/DXENDBucket/Create-Radar-Sable/issues"
logoFile = "pack.png"
logoBlur = false
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "create_radar.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "create"
type = "required"
versionRange = "${create_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "createbigcannons"
type = "required"
versionRange = "[5.10.1,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "sable"
type = "optional"
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "sablecompanion"
type = "optional"
versionRange = "[1.0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "shupapium"
type = "optional"
versionRange = "[1.0,2.0)"
ordering = "AFTER"
side = "BOTH"
